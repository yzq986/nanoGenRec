name: exp044c
description: "TO-RoPE item-pos fix + optional 3-dim RoPE (order, time, layer)"
base: _base.yaml

sid_cache_name: exp026-0.6b-14d
ntp_data_name: exp044b-0.6b-14d         # reuse 044B data (timestamps already present)

use_segment_emb: true
use_torope: true

# Configs (torope_time_split / torope_layer_split vary per run):
