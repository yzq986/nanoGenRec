#   B: torope_time_split=0.50, torope_layer_split=0.0   (2-dim ts=0.5 + pos fix)
#   C: torope_time_split=0.25, torope_layer_split=0.15  (3-dim layer=0.15)
#   D: torope_time_split=0.25, torope_layer_split=0.25  (3-dim layer=0.25)
#
# Representative config (C):
torope_time_split: 0.25
torope_layer_split: 0.15
