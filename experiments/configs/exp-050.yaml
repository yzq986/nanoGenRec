name: exp050
description: "M-tier NTP: 0.6b vs 4b SID × output-gate vs CADET (± RoPE on 0.6b) — ablation"
base: _base.yaml

# Model: M-tier (same as EXP-043/048 baseline)
embed_dim: 512
n_transformer_layers: 8
n_experts: 8
top_k: 2
lr: 1.0e-3

use_segment_emb: true

variants:
  - name: exp050-0.6b-gate
    sid_cache_name: exp049-0.6b-nc8192-h128
    ntp_data_name: exp049-0.6b-nc8192-h128
    use_gate_attn: true
  - name: exp050-0.6b-cadet
    sid_cache_name: exp049-0.6b-nc8192-h128
    ntp_data_name: exp049-0.6b-nc8192-h128
    attn_gating_mode: cadet
  - name: exp050-4b-gate
    sid_cache_name: exp049-4b-nc8192-h128
    ntp_data_name: exp049-4b-nc8192-h128
    use_gate_attn: true
  - name: exp050-4b-cadet
    sid_cache_name: exp049-4b-nc8192-h128
    ntp_data_name: exp049-4b-nc8192-h128
    attn_gating_mode: cadet
  # RoPE re-validation on bare M-tier with new SID (EXP-048 showed no benefit but used old SID)
  - name: exp050-0.6b-rope
    sid_cache_name: exp049-0.6b-nc8192-h128
    ntp_data_name: exp049-0.6b-nc8192-h128
    use_rope: true
    rope_dims: "order:0.5,time:0.5,layer:0.0"
